<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF7F2"/>
      <stop offset="100%" style="stop-color:#F0EBE3"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#8B2500" stroke-width="8"/>

  <!-- Inner circle ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#8B2500" stroke-width="2" opacity="0.3"/>

  <!-- Yin-Yang center -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#8B2500" stroke-width="3"/>
  <path d="M256 184 A72 72 0 0 1 256 328 A36 36 0 0 1 256 256 A36 36 0 0 0 256 184" fill="#8B2500"/>
  <circle cx="256" cy="220" r="11" fill="#FAF7F2"/>
  <circle cx="256" cy="292" r="11" fill="#8B2500"/>

  <!-- Eight Trigrams around the edge -->
  <!-- ☰ Qian - top -->
  <text x="256" y="80" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☰</text>

  <!-- ☱ Dui - top right -->
  <text x="362" y="110" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☱</text>

  <!-- ☲ Li - right -->
  <text x="406" y="200" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☲</text>

  <!-- ☳ Zhen - bottom right -->
  <text x="406" y="310" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☳</text>

  <!-- ☴ Xun - bottom left -->
  <text x="106" y="310" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☴</text>

  <!-- ☵ Kan - left -->
  <text x="106" y="200" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☵</text>

  <!-- ☶ Gen - top left -->
  <text x="150" y="110" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☶</text>

  <!-- ☷ Kun - bottom -->
  <text x="256" y="440" text-anchor="middle" font-size="24" fill="#8B2500" font-family="serif">☷</text>

  <!-- Center text -->
  <text x="256" y="268" text-anchor="middle" font-size="28" fill="#8B2500" font-family="serif" font-weight="bold">易</text>
</svg>
